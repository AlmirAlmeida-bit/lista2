<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Compras da Eliane</title>
    <link rel="icon" type="image/png" href="IMGS/carrinho.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="lista.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.5.28/dist/jspdf.plugin.autotable.min.js"></script>
</head>
<body>

    <div id="toast" class="toast" aria-live="polite"></div>

    <header class="site-header">
        <div class="header-inner">
            <div class="header-brand">
                <i class="fa-solid fa-cart-shopping header-icon"></i>
                <span class="header-title">Lista de Compras</span>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="card">

            <div class="card-header">
                <h1 id="tituloLista">Lista de Compras da Eliane</h1>
            </div>

            <div class="card-body">
                <div class="form-group">
                    <label for="nomeLista">
                        <i class="fa-solid fa-tag"></i> Nome da Lista
                    </label>
                    <input type="text" id="nomeLista" placeholder="Ex: Mercado da semana" maxlength="40">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="item">
                            <i class="fa-solid fa-box"></i> Item
                        </label>
                        <input type="text" id="item" placeholder="Ex: Arroz">
                    </div>
                    <div class="form-group form-group--small">
                        <label for="quantidade">
                            <i class="fa-solid fa-hashtag"></i> Qtd.
                        </label>
                        <input type="number" id="quantidade" placeholder="0" min="1">
                    </div>
                </div>

                <div class="form-group">
                    <label><i class="fa-solid fa-ruler"></i> Medida</label>
                    <div class="unidade-opcoes">
                        <label class="radio-pill">
                            <input type="radio" name="unidade" value="lt" checked>
                            <span>Lt</span>
                        </label>
                        <label class="radio-pill">
                            <input type="radio" name="unidade" value="kg">
                            <span>Kg</span>
                        </label>
                        <label class="radio-pill">
                            <input type="radio" name="unidade" value="Unid">
                            <span>Unid</span>
                        </label>
                        <label class="radio-pill">
                            <input type="radio" name="unidade" value="cx">
                            <span>Cx</span>
                        </label>
                        <label class="radio-pill">
                            <input type="radio" name="unidade" value="g">
                            <span>g</span>
                        </label>
                    </div>
                </div>

                <div class="actions">
                    <button id="adicionar" class="btn btn--primary">
                        <i class="fa-solid fa-plus"></i> Adicionar
                    </button>
                    <button id="editarUltimo" class="btn btn--secondary">
                        <i class="fa-solid fa-pen"></i> Editar Último
                    </button>
                    <button id="exportarPdf" class="btn btn--outline">
                        <i class="fa-solid fa-file-pdf"></i> Exportar PDF
                    </button>
                </div>
            </div>

            <div class="lista-section">
                <div class="lista-header">
                    <span class="lista-label">
                        <i class="fa-solid fa-list-check"></i> Itens da Lista
                    </span>
                    <span id="contadorItens" class="badge">0 itens</span>
                </div>

                <div id="listaDisplay" class="lista-display">
                    <div class="lista-vazia">
                        <i class="fa-solid fa-basket-shopping"></i>
                        <p>Nenhum item adicionado ainda.</p>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <footer class="site-footer">
        &copy; 2025 <a href="3tech.html" target="_blank">trestech.com.br</a> &mdash; Almir Almeida. Todos os direitos reservados.
    </footer>

    <script src="script.js"></script>
</body>
</html>
